services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL:?BASE_URL is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      TBK_COMMERCE_CODE: ${TBK_COMMERCE_CODE:-}
      TBK_API_KEY: ${TBK_API_KEY:-}
      TBK_ENV: ${TBK_ENV:-integration}
      PAYMENT_WEBHOOK_IP_ALLOWLIST: ${PAYMENT_WEBHOOK_IP_ALLOWLIST:?PAYMENT_WEBHOOK_IP_ALLOWLIST is required}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "bun", "run", "healthcheck.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      BASE_URL: ${BASE_URL:?BASE_URL is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      TBK_COMMERCE_CODE: ${TBK_COMMERCE_CODE:-}
      TBK_API_KEY: ${TBK_API_KEY:-}
      TBK_ENV: ${TBK_ENV:-integration}
      PAYMENT_WEBHOOK_IP_ALLOWLIST: ${PAYMENT_WEBHOOK_IP_ALLOWLIST:?PAYMENT_WEBHOOK_IP_ALLOWLIST is required}
      APP_VERSION: ${APP_VERSION:-1.0.0}
    command: ["sh", "-c", "bun run db:migrate && bun run worker.ts"]

  postgres:
    image: postgres:17-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5434}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    image: grafana/grafana:latest
    container_name: ecommerce-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - loki

  loki:
    image: grafana/loki:latest
    container_name: ecommerce-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: ecommerce-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus

volumes:
  pgdata:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
